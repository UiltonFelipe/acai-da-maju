<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Açaí da Maju - Cardápio Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo {
      width: 72px; height: 72px;
      margin: 0 auto 12px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { stroke: #fff; }
    .header h1 {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    /* Price Banner */
    .price-banner {
      background: #1a1a1a;
      color: #fff;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      margin-bottom: 24px;
    }
    .price-banner span {
      font-size: 13px;
      opacity: 0.8;
    }
    .price-banner .price {
      font-size: 32px;
      font-weight: 500;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }
    /* Steps */
    .step {
      margin-bottom: 20px;
      transition: opacity 0.3s ease;
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .step-number {
      width: 28px; height: 28px;
      background: #1a1a1a;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .step-title {
      font-size: 17px;
      font-weight: 500;
    }
    .step-subtitle {
      font-size: 12px;
      color: #888;
      margin: -6px 0 10px 28px;
    }
    .step-count {
      font-size: 12px;
      color: #888;
      background: #f0f0f0;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: auto;
    }
    /* Buttons */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-grid.full {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      text-align: left;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn:hover { border-color: #1a1a1a; }
    .btn.active {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }
    .btn-delivery {
      flex: 1;
      text-align: center;
      padding: 14px;
    }
    .btn-delivery .label {
      font-size: 14px;
      font-weight: 500;
    }
    .btn-delivery .sublabel {
      font-size: 12px;
      color: #888;
      font-weight: 400;
      margin-top: 2px;
    }
    /* Summary */
    .summary {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }
    .summary h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .summary-content {
      font-size: 13px;
      color: #555;
      line-height: 1.8;
    }
    .summary-content strong { color: #1a1a1a; }
    .summary-total {
      border-top: 1px solid #e0e0e0;
      margin-top: 12px;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .summary-total .label { font-size: 14px; font-weight: 500; }
    .summary-total .price {
      font-size: 22px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    /* WhatsApp Button */
    .btn-whatsapp {
      width: 100%;
      padding: 16px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .btn-whatsapp:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .btn-whatsapp:not(:disabled):hover {
      background: #333;
    }
    /* Disabled steps */
    .step.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    /* Delivery row */
    .delivery-row {
      display: flex;
      gap: 10px;
    }
    /* Responsive */
    @media (max-width: 400px) {
      .btn-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </div>
      <h1>Açaí da Maju</h1>
      <p>O melhor açaí da cidade</p>
    </div>

    <!-- Price -->
    <div class="price-banner">
      <span>Açaí tradicional</span>
      <div class="price">R$ 10,00</div>
    </div>

    <!-- Step 1: Creme -->
    <div class="step" id="step-creme">
      <div class="step-header">
        <div class="step-number">1</div>
        <div class="step-title">Escolha o creme</div>
      </div>
      <p class="step-subtitle">Pode escolher um ou os dois</p>
      <div class="btn-grid">
        <button class="btn" onclick="toggleCreme('açai')" id="btn-açai">Açaí</button>
        <button class="btn" onclick="toggleCreme('ninho')" id="btn-ninho">Ninho</button>
      </div>
    </div>

    <!-- Step 2: Ingredientes -->
    <div class="step disabled" id="step-ingredientes">
      <div class="step-header">
        <div class="step-number">2</div>
        <div class="step-title">Ingredientes</div>
        <span class="step-count" id="ing-count">0/5</span>
      </div>
      <p class="step-subtitle">Escolha até 5 ingredientes</p>
      <div class="btn-grid">
        <button class="btn" onclick="toggleIng('Ovomaltine')" id="ing-Ovomaltine">Ovomaltine</button>
        <button class="btn" onclick="toggleIng('Chocoball')" id="ing-Chocoball">Chocoball</button>
        <button class="btn" onclick="toggleIng('Choco Power')" id="ing-Choco Power">Choco Power</button>
        <button class="btn" onclick="toggleIng('Leite em pó')" id="ing-Leite em pó">Leite em pó</button>
        <button class="btn" onclick="toggleIng('Jujuba')" id="ing-Jujuba">Jujuba</button>
        <button class="btn" onclick="toggleIng('Granola')" id="ing-Granola">Granola</button>
        <button class="btn" onclick="toggleIng('Amendoim triturado')" id="ing-Amendoim triturado">Amendoim</button>
        <button class="btn" onclick="toggleIng('Coco ralado')" id="ing-Coco ralado">Coco ralado</button>
        <button class="btn" onclick="toggleIng('Gotas de chocolate')" id="ing-Gotas de chocolate" style="grid-column: span 2;">Gotas de chocolate</button>
      </div>
    </div>

    <!-- Step 3: Cobertura -->
    <div class="step disabled" id="step-cobertura">
      <div class="step-header">
        <div class="step-number">3</div>
        <div class="step-title">Cobertura (1)</div>
      </div>
      <div class="btn-grid full">
        <button class="btn" onclick="selectCobertura('Leite condensado')" id="cob-Leite condensado">Leite condensado</button>
        <button class="btn" onclick="selectCobertura('Cobertura de morango')" id="cob-Cobertura de morango">Cobertura de morango</button>
        <button class="btn" onclick="selectCobertura('Cobertura de chocolate')" id="cob-Cobertura de chocolate">Cobertura de chocolate</button>
      </div>
    </div>

    <!-- Step 4: Entrega -->
    <div class="step disabled" id="step-entrega">
      <div class="step-header">
        <div class="step-number">4</div>
        <div class="step-title">Forma de entrega</div>
      </div>
      <div class="delivery-row">
        <button class="btn btn-delivery" onclick="selectEntrega('retirada')" id="ent-retirada">
          <div class="label">Retirada</div>
          <div class="sublabel">Grátis</div>
        </button>
        <button class="btn btn-delivery" onclick="selectEntrega('delivery')" id="ent-delivery">
          <div class="label">Delivery</div>
          <div class="sublabel">+ R$ 2,00</div>
        </button>
      </div>
    </div>

    <!-- Resumo -->
    <div class="summary" id="resumo">
      <h3>Seu pedido</h3>
      <div class="summary-content" id="resumo-content"></div>
      <div class="summary-total">
        <span class="label">Total</span>
        <span class="price" id="total-price">R$ 10,00</span>
      </div>
    </div>

    <!-- WhatsApp -->
    <button class="btn-whatsapp" id="btn-whatsapp" onclick="enviarPedido()" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
      Enviar pedido pelo WhatsApp
    </button>
  </div>

  <script>
    let state = {
      cremes: [],
      ingredientes: [],
      cobertura: null,
      entrega: null
    };

    function toggleCreme(creme) {
      const idx = state.cremes.indexOf(creme);
      if (idx > -1) state.cremes.splice(idx, 1);
      else state.cremes.push(creme);

      document.querySelectorAll('#step-creme .btn').forEach(btn => {
        const name = btn.id.replace('btn-', '');
        btn.classList.toggle('active', state.cremes.includes(name));
      });

      if (state.cremes.length > 0) enableStep('step-ingredientes');
      else {
        disableStep('step-ingredientes');
        disableStep('step-cobertura');
        disableStep('step-entrega');
      }
      updateResumo();
    }

    function toggleIng(ing) {
      const idx = state.ingredientes.indexOf(ing);
      if (idx > -1) state.ingredientes.splice(idx, 1);
      else {
        if (state.ingredientes.length >= 5) {
          alert('Você pode escolher no máximo 5 ingredientes!');
          return;
        }
        state.ingredientes.push(ing);
      }

      document.querySelectorAll('#step-ingredientes .btn').forEach(btn => {
        const name = btn.id.replace('ing-', '');
        btn.classList.toggle('active', state.ingredientes.includes(name));
      });

      document.getElementById('ing-count').textContent = state.ingredientes.length + '/5';

      if (state.ingredientes.length > 0) enableStep('step-cobertura');
      else {
        disableStep('step-cobertura');
        disableStep('step-entrega');
      }
      updateResumo();
    }

    function selectCobertura(cob) {
      state.cobertura = cob;
      document.querySelectorAll('#step-cobertura .btn').forEach(btn => {
        btn.classList.toggle('active', btn.id === 'cob-' + cob);
      });
      enableStep('step-entrega');
      updateResumo();
    }

    function selectEntrega(ent) {
      state.entrega = ent;
      document.querySelectorAll('#step-entrega .btn').forEach(btn => {
        btn.classList.toggle('active', btn.id === 'ent-' + ent);
      });
      updateResumo();
    }

    function enableStep(id) {
      document.getElementById(id).classList.remove('disabled');
    }
    function disableStep(id) {
      document.getElementById(id).classList.add('disabled');
    }

    function updateResumo() {
      const resumo = document.getElementById('resumo');
      const content = document.getElementById('resumo-content');
      const totalEl = document.getElementById('total-price');
      const btn = document.getElementById('btn-whatsapp');

      if (state.cremes.length === 0) {
        resumo.style.display = 'none';
        btn.disabled = true;
        return;
      }

      resumo.style.display = 'block';
      let html = '<div><strong>Creme:</strong> ' + state.cremes.map(c => c.charAt(0).toUpperCase() + c.slice(1)).join(' + ') + '</div>';
      if (state.ingredientes.length > 0) html += '<div><strong>Ingredientes:</strong> ' + state.ingredientes.join(', ') + '</div>';
      if (state.cobertura) html += '<div><strong>Cobertura:</strong> ' + state.cobertura + '</div>';
      if (state.entrega) html += '<div><strong>Entrega:</strong> ' + (state.entrega === 'delivery' ? 'Delivery (+ R$ 2,00)' : 'Retirada (Grátis)') + '</div>';
      content.innerHTML = html;

      let total = 10;
      if (state.entrega === 'delivery') total += 2;
      totalEl.textContent = 'R$ ' + total.toFixed(2).replace('.', ',');

      btn.disabled = !(state.cremes.length > 0 && state.ingredientes.length > 0 && state.cobertura && state.entrega);
    }

    function enviarPedido() {
      let msg = '*Pedido - Açaí da Maju*\n\n';
      msg += 'Creme: ' + state.cremes.map(c => c.charAt(0).toUpperCase() + c.slice(1)).join(' + ') + '\n';
      msg += 'Ingredientes: ' + state.ingredientes.join(', ') + '\n';
      msg += 'Cobertura: ' + state.cobertura + '\n';
      msg += 'Entrega: ' + (state.entrega === 'delivery' ? 'Delivery (+R$ 2,00)' : 'Retirada (Grátis)') + '\n\n';
      let total = 10 + (state.entrega === 'delivery' ? 2 : 0);
      msg += 'Total: R$ ' + total.toFixed(2).replace('.', ',') + '\n';
      msg += '\nObs: Endereço para entrega será informado aqui.';
      window.open('https://wa.me/5585992813244?text=' + encodeURIComponent(msg), '_blank');
    }
  </script>
</body>
</html>
